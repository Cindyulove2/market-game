<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Game — Decision History</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .history-header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .history-header h1 {
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .history-header .group-label {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .nav-bar a {
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.15s;
    }
    .nav-bar a:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover {
      border-color: var(--accent);
    }
    .filter-btn.active {
      border-color: var(--accent);
      background: rgba(59,130,246,0.15);
      color: var(--accent);
    }
    .round-section {
      margin-bottom: 24px;
    }
    .round-header {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .round-number {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--accent);
      white-space: nowrap;
    }
    .round-event {
      font-size: 0.95rem;
      color: var(--text-dim);
      flex: 1;
      min-width: 200px;
    }
    .round-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      background: var(--surface2);
    }
    .meta-chip .label {
      color: var(--text-dim);
      font-weight: 600;
    }
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .orders-table th {
      padding: 8px 10px;
      font-size: 0.75rem;
      background: var(--surface2);
    }
    .orders-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .orders-table tr.highlighted {
      background: rgba(59,130,246,0.12);
      border-left: 3px solid var(--accent);
    }
    .direction-buy { color: var(--green); font-weight: 700; }
    .direction-sell { color: var(--red); font-weight: 700; }
    .direction-hold { color: var(--orange); font-weight: 700; }
    .direction-mm { color: var(--purple); font-weight: 700; }
    .flag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 4px;
      margin-bottom: 2px;
    }
    .flag-emotion { background: rgba(239,68,68,0.15); color: var(--red); }
    .flag-follow { background: rgba(245,158,11,0.15); color: var(--orange); }
    .flag-short { background: rgba(168,85,247,0.15); color: var(--purple); }
    .flag-cover { background: rgba(34,197,94,0.15); color: var(--green); }
    .trade-line {
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.4;
    }
    .trade-line .bought { color: var(--green); }
    .trade-line .sold { color: var(--red); }
    .portfolio-section {
      margin-top: 32px;
    }
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .portfolio-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .portfolio-card.highlighted {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(59,130,246,0.2);
    }
    .portfolio-card .group-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .portfolio-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .portfolio-table th {
      padding: 6px 8px;
      font-size: 0.7rem;
      background: var(--surface2);
    }
    .portfolio-table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }
    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      font-size: 1.2rem;
    }
    .section-title {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    @media (max-width: 768px) {
      .history-header { flex-direction: column; text-align: center; }
      .round-header { flex-direction: column; }
      .orders-table { font-size: 0.8rem; }
      .orders-table th, .orders-table td { padding: 6px 6px; }
      .portfolio-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="history-header">
    <h1>Decision History</h1>
    <div id="groupLabel" class="group-label"></div>
  </div>
  <div class="nav-bar">
    <a href="index.html">Back to Game</a>
    <span style="color: var(--border); margin: 0 4px;">|</span>
    <button class="filter-btn active" data-filter="all">All Groups</button>
    <button class="filter-btn" data-filter="1">🏛️ 1</button>
    <button class="filter-btn" data-filter="2">🐺 2</button>
    <button class="filter-btn" data-filter="3">😊 3</button>
    <button class="filter-btn" data-filter="4">🚀 4</button>
    <button class="filter-btn" data-filter="5">🏦 5</button>
  </div>

  <div class="container-wide" style="padding-top: 24px;">
    <div id="roundsContainer"></div>
    <div id="portfolioContainer" class="portfolio-section"></div>
    <div id="noData" class="no-data hidden">No rounds have been played yet.</div>
  </div>

  <script src="js/game.js"></script>
  <script src="js/store.js"></script>
  <script>
    // --- Parse URL params ---
    const params = new URLSearchParams(window.location.search);
    let filterGroupId = params.get('id') ? parseInt(params.get('id'), 10) : null;
    if (filterGroupId && (filterGroupId < 1 || filterGroupId > 5)) filterGroupId = null;

    // Set initial header label
    if (filterGroupId) {
      const role = ROLES[filterGroupId];
      document.getElementById('groupLabel').textContent =
        'Group ' + filterGroupId + ' \u2014 ' + role.icon + ' ' + role.name;
    }

    // Set initial active filter button
    if (filterGroupId) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.filter === String(filterGroupId)) btn.classList.add('active');
      });
    }

    // --- Filter button logic ---
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        if (f === 'all') {
          filterGroupId = null;
          document.getElementById('groupLabel').textContent = '';
        } else {
          filterGroupId = parseInt(f, 10);
          const role = ROLES[filterGroupId];
          document.getElementById('groupLabel').textContent =
            'Group ' + filterGroupId + ' \u2014 ' + role.icon + ' ' + role.name;
        }
        render(store.getState());
      });
    });

    // --- Helper functions ---
    function getGroupName(g) {
      const role = ROLES[g];
      return role.icon + ' Group ' + g + ' (' + role.name + ')';
    }

    function formatDirection(order) {
      if (!order) return '<span class="direction-hold">NO ORDER</span>';
      if (order.role === 'marketmaker') return '<span class="direction-mm">BID + ASK</span>';
      if (order.direction === 'buy') return '<span class="direction-buy">BUY</span>';
      if (order.direction === 'sell') return '<span class="direction-sell">SELL</span>';
      if (order.direction === 'hold') return '<span class="direction-hold">HOLD</span>';
      return '<span class="direction-hold">HOLD</span>';
    }

    function formatPrice(order) {
      if (!order) return '-';
      if (order.role === 'marketmaker') {
        return 'Bid: ' + (order.bidPrice || '-') + ' / Ask: ' + (order.askPrice || '-');
      }
      if (order.direction === 'hold') return '-';
      return order.price != null ? order.price : '-';
    }

    function formatQuantity(order) {
      if (!order) return '-';
      if (order.role === 'marketmaker') {
        return 'Bid: ' + (order.bidQty || 0) + ' / Ask: ' + (order.askQty || 0);
      }
      if (order.direction === 'hold') return '-';
      let qty = order.quantity || 0;
      if (order.retailMode === 'emotion' && order.emotionExtra) qty += 1;
      return qty;
    }

    function formatImpliedR(order, D) {
      const ir = computeImpliedR(order, D);
      if (!ir) return '-';
      if (typeof ir === 'object') {
        const parts = [];
        if (ir.bidR != null) parts.push('Bid r: ' + (ir.bidR * 100).toFixed(1) + '%');
        if (ir.askR != null) parts.push('Ask r: ' + (ir.askR * 100).toFixed(1) + '%');
        return parts.join(' / ') || '-';
      }
      return (ir * 100).toFixed(1) + '%';
    }

    function formatFlags(order) {
      if (!order) return '';
      const flags = [];
      if (order.retailMode === 'emotion' || order.emotionExtra) {
        flags.push('<span class="flag flag-emotion">EMOTION</span>');
      }
      if (order.followTrendActive) {
        flags.push('<span class="flag flag-follow">FOLLOW-TREND</span>');
      }
      if (order.isShort) {
        flags.push('<span class="flag flag-short">SHORT</span>');
      }
      if (order.isCover) {
        flags.push('<span class="flag flag-cover">COVER</span>');
      }
      return flags.join(' ') || '-';
    }

    function formatTrades(groupId, trades) {
      if (!trades || trades.length === 0) return '<span class="trade-line">No trades</span>';
      const myTrades = trades.filter(t => t.buyer === groupId || t.seller === groupId);
      if (myTrades.length === 0) return '<span class="trade-line">No fills</span>';
      return myTrades.map(t => {
        if (t.buyer === groupId) {
          return '<span class="trade-line"><span class="bought">BOUGHT</span> ' +
            t.qty + ' @ ' + t.price + '</span>';
        } else {
          return '<span class="trade-line"><span class="sold">SOLD</span> ' +
            t.qty + ' @ ' + t.price + '</span>';
        }
      }).join('<br>');
    }

    // --- Main render ---
    function render(state) {
      const roundsEl = document.getElementById('roundsContainer');
      const portfolioEl = document.getElementById('portfolioContainer');
      const noDataEl = document.getElementById('noData');

      // Determine how many rounds have been played
      const allOrders = state.allOrders || {};
      let playedRounds = 0;
      const totalRounds = state.totalRounds || 5;
      for (let r = 1; r <= totalRounds; r++) {
        if (allOrders['round' + r]) playedRounds = r;
      }

      if (playedRounds === 0) {
        roundsEl.innerHTML = '';
        portfolioEl.innerHTML = '';
        noDataEl.classList.remove('hidden');
        return;
      }

      noDataEl.classList.add('hidden');

      // --- Render round sections ---
      let roundsHTML = '<div class="section-title">Round-by-Round Orders</div>';

      for (let r = 1; r <= playedRounds; r++) {
        const roundData = ROUNDS[r - 1];
        const roundOrders = allOrders['round' + r] || {};
        const clearingPrice = state.priceHistory[r] != null ? state.priceHistory[r] : null;
        const pStar = state.pStarHistory[r] != null ? state.pStarHistory[r] : null;
        const D = roundData.D;

        // Reconstruct trades for this round by re-running matching
        const matchResult = runMatching(roundOrders, state.priceHistory[r - 1], D);
        const trades = matchResult.trades;

        roundsHTML += '<div class="round-section card">';
        roundsHTML += '<div class="round-header">';
        roundsHTML += '<span class="round-number">Round ' + r + '</span>';
        roundsHTML += '<span class="round-event">' + escapeHtml(roundData.event) + '</span>';
        roundsHTML += '</div>';

        roundsHTML += '<div class="round-meta">';
        roundsHTML += '<span class="meta-chip"><span class="label">D =</span> ' + D + '</span>';
        if (clearingPrice != null) {
          roundsHTML += '<span class="meta-chip"><span class="label">Clearing Price:</span> ' + clearingPrice + '</span>';
        }
        if (pStar != null) {
          roundsHTML += '<span class="meta-chip"><span class="label">P* =</span> ' + pStar + '</span>';
        }
        roundsHTML += '</div>';

        // Orders table
        roundsHTML += '<div style="overflow-x: auto;">';
        roundsHTML += '<table class="orders-table">';
        roundsHTML += '<thead><tr>';
        roundsHTML += '<th>Group</th><th>Direction</th><th>Price</th><th>Quantity</th>';
        roundsHTML += '<th>Implied r</th><th>Flags</th><th>Trades</th>';
        roundsHTML += '</tr></thead><tbody>';

        for (let g = 1; g <= 5; g++) {
          const order = roundOrders['group' + g] || null;
          const isHighlighted = filterGroupId === g;
          const rowClass = isHighlighted ? ' class="highlighted"' : '';

          // If filtering and this is not the filtered group, still show but dimmed
          let rowStyle = '';
          if (filterGroupId && filterGroupId !== g) {
            rowStyle = ' style="opacity: 0.45;"';
          }

          roundsHTML += '<tr' + rowClass + rowStyle + '>';
          roundsHTML += '<td style="white-space:nowrap;">' + getGroupName(g) + '</td>';
          roundsHTML += '<td>' + formatDirection(order) + '</td>';
          roundsHTML += '<td>' + formatPrice(order) + '</td>';
          roundsHTML += '<td>' + formatQuantity(order) + '</td>';
          roundsHTML += '<td>' + formatImpliedR(order, D) + '</td>';
          roundsHTML += '<td>' + formatFlags(order) + '</td>';
          roundsHTML += '<td>' + formatTrades(g, trades) + '</td>';
          roundsHTML += '</tr>';
        }

        roundsHTML += '</tbody></table></div></div>';
      }

      roundsEl.innerHTML = roundsHTML;

      // --- Render portfolio timeline ---
      let portHTML = '<div class="section-title">Portfolio Timeline</div>';
      portHTML += '<div class="portfolio-grid">';

      for (let g = 1; g <= 5; g++) {
        const role = ROLES[g];
        const isHighlighted = filterGroupId === g;
        const cardClass = isHighlighted ? 'portfolio-card highlighted' : 'portfolio-card';
        let cardStyle = '';
        if (filterGroupId && filterGroupId !== g) {
          cardStyle = ' style="opacity: 0.45;"';
        }

        const groupKey = 'group' + g;
        const assets = state.assetHistory[groupKey] || [];
        const portfolio = state.portfolios[groupKey] || {};

        portHTML += '<div class="' + cardClass + '"' + cardStyle + '>';
        portHTML += '<div class="group-title">' + role.icon + ' Group ' + g + ' &mdash; ' + role.name + '</div>';

        portHTML += '<table class="portfolio-table">';
        portHTML += '<thead><tr><th>Round</th><th>Total Assets</th><th>Change</th></tr></thead>';
        portHTML += '<tbody>';

        // Initial state
        portHTML += '<tr>';
        portHTML += '<td>Start</td>';
        portHTML += '<td>' + (assets[0] != null ? assets[0].toFixed(1) : '-') + '</td>';
        portHTML += '<td>-</td>';
        portHTML += '</tr>';

        for (let r = 1; r <= playedRounds; r++) {
          const val = assets[r] != null ? assets[r] : null;
          const prev = assets[r - 1] != null ? assets[r - 1] : null;
          let change = '-';
          let changeClass = '';
          if (val != null && prev != null) {
            const diff = val - prev;
            if (diff > 0) {
              change = '+' + diff.toFixed(1);
              changeClass = ' class="text-green"';
            } else if (diff < 0) {
              change = diff.toFixed(1);
              changeClass = ' class="text-red"';
            } else {
              change = '0.0';
            }
          }
          portHTML += '<tr>';
          portHTML += '<td>Round ' + r + '</td>';
          portHTML += '<td>' + (val != null ? val.toFixed(1) : '-') + '</td>';
          portHTML += '<td' + changeClass + '>' + change + '</td>';
          portHTML += '</tr>';
        }

        // Current portfolio details
        portHTML += '</tbody></table>';
        portHTML += '<div style="margin-top: 10px; font-size: 0.8rem; color: var(--text-dim);">';
        portHTML += 'Cash: ' + (portfolio.cash != null ? portfolio.cash.toFixed(1) : '-');
        portHTML += ' &middot; Shares: ' + (portfolio.shares != null ? portfolio.shares : '-');
        if (portfolio.shortPosition > 0) {
          portHTML += ' &middot; <span class="text-red">Short: ' + portfolio.shortPosition + '</span>';
        }
        if (portfolio.dividendAccumulated > 0) {
          portHTML += ' &middot; <span class="text-green">Dividends: ' + portfolio.dividendAccumulated.toFixed(1) + '</span>';
        }
        if (portfolio.frozen) {
          portHTML += ' &middot; <span class="text-red fw-bold">FROZEN</span>';
        }
        portHTML += '</div>';
        portHTML += '</div>';
      }

      portHTML += '</div>';
      portfolioEl.innerHTML = portHTML;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Initial render + subscribe ---
    render(store.getState());
    store.subscribe(function(state) {
      render(state);
    });
  </script>
</body>
</html>
