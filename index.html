<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Market Game</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .landing h1 {
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .landing .subtitle {
      font-size: 1.2rem;
      color: var(--text-dim);
      margin-bottom: 48px;
    }
    .role-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      max-width: 1000px;
      width: 100%;
      margin-bottom: 32px;
    }
    .role-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 24px 16px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .role-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.2);
    }
    .role-card .icon { font-size: 2.5rem; }
    .role-card .name { font-weight: 700; font-size: 1rem; }
    .role-card .role-tag {
      font-size: 0.8rem;
      color: var(--text-dim);
      background: var(--bg);
      padding: 2px 10px;
      border-radius: 10px;
    }
    .admin-link {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }
    .admin-link a {
      color: var(--text-dim);
      text-decoration: none;
      padding: 10px 24px;
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.2s;
    }
    .admin-link a:hover {
      border-color: var(--accent);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1>THE MARKET GAME</h1>
    <p class="subtitle">Stock Market Simulation — Select Your Group</p>
    <div class="role-grid">
      <a href="group.html?id=1" class="role-card">
        <span class="icon">🏛️</span>
        <span class="name">Group 1</span>
        <span class="role-tag">Pension Fund</span>
      </a>
      <a href="group.html?id=2" class="role-card">
        <span class="icon">🐺</span>
        <span class="name">Group 2</span>
        <span class="role-tag">Hedge Fund</span>
      </a>
      <a href="group.html?id=3" class="role-card">
        <span class="icon">😊</span>
        <span class="name">Group 3</span>
        <span class="role-tag">Retail Investors</span>
      </a>
      <a href="group.html?id=4" class="role-card">
        <span class="icon">🚀</span>
        <span class="name">Group 4</span>
        <span class="role-tag">Growth Fund</span>
      </a>
      <a href="group.html?id=5" class="role-card">
        <span class="icon">🏦</span>
        <span class="name">Group 5</span>
        <span class="role-tag">Market Maker</span>
      </a>
    </div>
    <div class="admin-link">
      <a href="roles.html">📖 Group Guide</a>
      <a href="history.html">📋 Decision History</a>
      <a href="admin.html">🔧 Admin Panel</a>
      <a href="display.html">📺 Display Screen</a>
    </div>
  </div>
</body>
</html>
